<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone - Projeto TCS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- O conteúdo será injetado pelo JavaScript -->
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Container de Toasts -->
    <div id="toast-container"></div>

    <!-- Console de Debug -->
    <div id="debug-console" class="debug-console collapsed">
        <div class="debug-header">
            <span>Console de Comunicação (Cliente ↔ Servidor)</span>
            <button id="toggle-console">▲</button>
        </div>
        <div id="debug-content" class="debug-content"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
